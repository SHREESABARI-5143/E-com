<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple E-Commerce Website</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f4f4f4;
    }

    header{
      background:#222;
      color:white;
      padding:20px;
      text-align:center;
    }

    nav{
      background:#444;
      padding:12px;
      text-align:center;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin:0 15px;
      font-size:18px;
    }

    .banner{
      background:url('https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=1200') center/cover;
      height:300px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
      font-size:40px;
      font-weight:bold;
      text-shadow:2px 2px 5px black;
    }

    .products{
      padding:40px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    }

    .card{
      background:white;
      border-radius:10px;
      overflow:hidden;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
      transition:0.3s;
    }

    .card:hover{
      transform:scale(1.03);
    }

    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .card-content{
      padding:20px;
      text-align:center;
    }

    .card-content h3{
      margin-bottom:10px;
    }

    .price{
      color:green;
      font-size:22px;
      margin-bottom:15px;
    }

    button{
      background:#222;
      color:white;
      border:none;
      padding:10px 20px;
      border-radius:5px;
      cursor:pointer;
    }

    button:hover{
      background:orange;
    }

    footer{
      background:#222;
      color:white;
      text-align:center;
      padding:20px;
      margin-top:30px;
    }
  </style>
</head>

<body>

  <header>
    <h1>Sabari E-Commerce</h1>
    <p>Simple Shopping Website</p>
  </header>

  <nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">Offers</a>
    <a href="#">Contact</a>
  </nav>

  <section class="banner">
    Welcome to Our Store
  </section>

  <section class="products">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=1000" alt="Shoes">
      <div class="card-content">
        <h3>Sports Shoes</h3>
        <p class="price">₹1999</p>
        <button onclick="buyProduct('Sports Shoes')">Buy Now</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=1000" alt="Phone">
      <div class="card-content">
        <h3>Smart Phone</h3>
        <p class="price">₹14999</p>
        <button onclick="buyProduct('Smart Phone')">Buy Now</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=1000" alt="Headphones">
      <div class="card-content">
        <h3>Headphones</h3>
        <p class="price">₹2999</p>
        <button onclick="buyProduct('Headphones')">Buy Now</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=1000" alt="Tshirt">
      <div class="card-content">
        <h3>T-Shirt</h3>
        <p class="price">₹799</p>
        <button onclick="buyProduct('T-Shirt')">Buy Now</button>
      </div>
    </div>

  </section>

  <footer>
    <p>© 2026 Sabari E-Commerce | All Rights Reserved</p>
  </footer>

  <script>
    function buyProduct(product){
      alert(product + " added to cart successfully!");
    }
  </script>

</body>
</html>
